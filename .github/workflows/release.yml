# GitHub Actions: タグ push をトリガに 3 OS 分の LZH プラグインをビルドし、
# GitHub Releases に draft として公開する。
#
#   トリガ:
#     - `v*` 形式のタグ push (v1.0.0 など)
#     - workflow_dispatch (GitHub UI から手動起動: 試運転用)
#
#   フロー:
#     1. matrix で macOS(arm64) / Linux(x86_64) / Windows(x64) をビルド
#     2. 成果物 (LzhArchivePlugin.{dylib,so,dll}) を release ジョブへ集約
#     3. ファイル名にタグと OS を埋め込んで draft Release に添付
#        → 中身を確認してから手動で Publish する運用
#
#   ★ABI 一致が必須: プラグインは farman 本体と同じ Qt / libarchive で
#     ビルドしないと、farman プロセスにロードされたときに qobject_cast や
#     動的リンク解決に失敗する。QT_VERSION は farman 本体の release.yml と
#     必ず揃えること (現在 6.10.3)。
#
#   ★配布バイナリの実行時リンク: ビルド直後の成果物は Qt / libarchive を
#     「ビルド環境のパス」で参照している。farman.app にロードさせるため、macOS
#     ジョブで install name を @executable_path/../Frameworks/ に書き換える
#     (farman が macdeployqt でバンドルするフレームワーク位置。バンドル版
#     farman.app での実機ロードを確認済み)。Linux/Windows は同名の Qt /
#     libarchive が farman プロセスに既ロードなら再利用されるため書き換え不要。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). 手動起動時のみ必須。'
        required: true

env:
  # farman 本体 (.github/workflows/release.yml の QT_VERSION) と揃えること。
  QT_VERSION: 6.10.3
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos
          - name: Linux (x86_64)
            os: ubuntu-22.04
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact_name: linux
          - name: Windows (x64)
            os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            artifact_name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          # qt5compat: Core5Compat (QTextCodec 経由の Shift-JIS 判定で使う)
          modules: qt5compat

      # ──────── 依存ライブラリ (libarchive) ────────
      - name: Install libarchive (macOS)
        if: runner.os == 'macOS'
        run: brew install libarchive

      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev

      # vcpkg のバイナリキャッシュ (GitHub Actions Cache バックエンド) を使うと、
      # 2 回目以降の Windows ビルドで libarchive + 圧縮系依存の再ビルドを省ける
      # (初回コールドビルドは 15 分前後 → キャッシュヒット時は数分)。GHA Cache に
      # 書き込むための URL / token をこのステップで後続へエクスポートする。
      - name: Setup vcpkg binary cache env (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install libarchive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          # x-gha: GitHub Actions Cache を vcpkg のバイナリキャッシュ先にする。
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          vcpkg install libarchive:x64-windows
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" `
            | Out-File -FilePath $env:GITHUB_ENV -Append

      # ──────── Configure / Build ────────
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      # ──────── 成果物の収集・命名 ────────
      # ビルド出力先はジェネレータで異なる (単一構成: build/dist/, MSVC 多構成:
      # build/dist/Release/)。拡張子も OS で違うので find で拾って正規名にする。
      - name: Collect artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out
          f=$(find build -type f \( -name 'LzhArchivePlugin.dylib' -o -name 'LzhArchivePlugin.so' \) | head -1)
          echo "built: $f"
          cp "$f" "out/$(basename "$f")"

          # macOS: プラグインの Qt / libarchive 参照を、farman.app が
          # macdeployqt でバンドルする実ファイル位置 @executable_path/../Frameworks/
          # に書き換える。@executable_path は「ロードする側の "実行ファイル"
          # (= farman 本体)」を指すので、外部ディレクトリに置いたプラグインでも
          # farman.app/Contents/Frameworks/ の既ロード済みフレームワークに解決・
          # 再利用される (Qt バージョンや framework の install-name id に依存しない)。
          # ※ @rpath だとプラグイン自身の RPATH で解決されてしまい、farman の
          #   バンドルには届かないため不可 (実機検証で確認済み)。
          if [ "${{ runner.os }}" = "macOS" ]; then
            dylib="out/LzhArchivePlugin.dylib"
            fw="@executable_path/../Frameworks"
            for dep in $(otool -L "$dylib" | awk 'NR>1{print $1}'); do
              case "$dep" in
                *QtCore.framework*)
                  install_name_tool -change "$dep" \
                    "$fw/QtCore.framework/Versions/A/QtCore" "$dylib" ;;
                *QtCore5Compat.framework*)
                  install_name_tool -change "$dep" \
                    "$fw/QtCore5Compat.framework/Versions/A/QtCore5Compat" "$dylib" ;;
                *libarchive*.dylib)
                  install_name_tool -change "$dep" \
                    "$fw/libarchive.13.dylib" "$dylib" ;;
              esac
            done
            echo "=== rewritten otool -L ==="
            otool -L "$dylib" || true
          fi

      # 署名 + 公証 (macOS)。install_name 書き換えで署名が無効化されるため、
      # 書き換えの「後」に署名する。MACOS_* secrets が揃っていれば Mashsoft の
      # Developer ID で署名 + 公証し、ダウンロードした dylib が Gatekeeper の
      # 「マルウェアを検証できない」で弾かれないようにする。secrets が無ければ
      # ad-hoc のまま (その場合ユーザーは xattr -dr com.apple.quarantine が必要)。
      # bare dylib は staple 不可なので、公証済み cdhash のオンライン照合に頼る。
      - name: Sign and notarize (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT_BASE64:   ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID:      ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          TEAM_ID:       ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          NOTARY_PW:     ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          dylib="out/LzhArchivePlugin.dylib"
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::Developer ID signing NOT available (MACOS_* secrets 未設定)。"
            echo "ad-hoc のまま配布します。ユーザーは xattr -dr com.apple.quarantine が必要です。"
            exit 0
          fi

          # 一時 Keychain に .p12 を import (farman の release.yml と同手順)。
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -n 1 | awk '{print $2}')
          if [ -z "$IDENTITY_HASH" ]; then
            echo "::error::Developer ID Application identity not found after import"; exit 1
          fi

          # Hardened Runtime + secure timestamp で署名 (公証の前提条件)。
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY_HASH" "$dylib"
          codesign --verify --strict "$dylib"

          # 公証: bare dylib は zip にまとめて notarytool へ提出しオンライン照合。
          /usr/bin/ditto -c -k "$dylib" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$NOTARY_PW" --wait
          echo "signed + notarized: $(codesign -dv "$dylib" 2>&1 | grep -i authority | head -1)"

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $f = Get-ChildItem -Path build -Recurse -Filter LzhArchivePlugin.dll | Select-Object -First 1
          Write-Host "built: $($f.FullName)"
          Copy-Item $f.FullName "out/LzhArchivePlugin.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename artifacts with tag + OS
        run: |
          cd dist
          ls -la */
          TAG="${{ steps.tag.outputs.tag }}"
          mv macos/LzhArchivePlugin.dylib   "LzhArchivePlugin-${TAG}-macos-arm64.dylib"
          mv linux/LzhArchivePlugin.so      "LzhArchivePlugin-${TAG}-linux-x86_64.so"
          mv windows/LzhArchivePlugin.dll   "LzhArchivePlugin-${TAG}-windows-x64.dll"
          ls -la

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in LzhArchivePlugin-*; do
            [ -f "$f" ] || continue
            shasum -a 256 "$f" > "$f.sha256"
            cat "$f.sha256"
          done

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LZH plugin ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/LzhArchivePlugin-*-macos-arm64.dylib
            dist/LzhArchivePlugin-*-macos-arm64.dylib.sha256
            dist/LzhArchivePlugin-*-linux-x86_64.so
            dist/LzhArchivePlugin-*-linux-x86_64.so.sha256
            dist/LzhArchivePlugin-*-windows-x64.dll
            dist/LzhArchivePlugin-*-windows-x64.dll.sha256
